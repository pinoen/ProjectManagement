version: '3.8'
services:
  db:
    image: postgres:16
    container_name: pm_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: grupoat
      POSTGRES_DB: project_management_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: